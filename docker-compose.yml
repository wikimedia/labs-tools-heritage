services:
  bot:
    extends:
      file: docker-compose-base.yml
      service: bot
    links:
      - db
      - db_commons
    environment:
      - HERITAGE_LOCAL_WRITE_PATH=docker_pages
      - DB_USERNAME=$TOOLFORGE_DB_USERNAME
      - DB_PASSWORD=$TOOLFORGE_DB_PASSWORD
    volumes:
      - "./conf/database_config.dev.yml:/code/erfgoedbot/database_config.yml"

  db:
    extends:
      file: docker-compose-base.yml
      service: db_empty
    ports:
      - "${HERITAGE_DBPORT:-3306}:3306"

  web:
    extends:
      file: docker-compose-base.yml
      service: web
    links:
      - db
    volumes:
      - .:/var/www/

  db_commons:
    image: jeanfred/wiki-replicas-proxy
    platform: linux/amd64
    volumes:
      - $SSH_AUTH_SOCK:$SSH_AUTH_SOCK
    environment:
      SSH_USER: $SSH_USER
      WIKI_DB: commonswiki
      SSH_AUTH_SOCK:
