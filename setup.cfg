[tool:pytest]
testpaths = tests
addopts = --verbose --cov=erfgoedbot --disable-socket
pythonpath = . tests

[isort]
known_first_party = erfgoedbot
known_third_party = freezegun,pymysql,requests,yaml
known_pywikibot = pywikibot
multi_line_output = 3
sections = FUTURE,STDLIB,THIRDPARTY,PYWIKIBOT,FIRSTPARTY,LOCALFOLDER

[flake8]
extend-ignore = W504,W605,E117
